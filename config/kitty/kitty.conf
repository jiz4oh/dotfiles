# vim:fileencoding=utf-8:ft=kitty
# kitty 主入口。
# 这个文件尽量保持很短，后续大多数调整都放到分模块文件里。

# 字体、窗口外观、tab 栏与整体视觉密度。
include ui.conf
# 复制粘贴、滚动历史、shell 联动等运行时行为。
include behavior.conf
# 键盘驱动的窗口、tab、搜索与导航快捷键。
include bindings.conf
# 远程控制 socket 与外部脚本依赖的集成配置。
include integration.conf

# 主题单独放置，这样换配色时不会混入行为变更。
include current-theme.conf
# 给当前机器预留的本地覆盖入口。
include ~/.kitty.env
