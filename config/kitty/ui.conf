# vim:fileencoding=utf-8:ft=kitty
# 视觉与窗口默认值，目标是适合日常开发长时间使用。

# 保持现有字体体系，避免 prompt、图标和 Nerd Font 字形跑偏。
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
# 默认字号设为 14，减少每次打开后立刻缩放的需要。
font_size 14.0
# 使用平台原生文本合成策略，保证 macOS 下字重更稳定。
text_composition_strategy platform

# 光标使用 beam，和 shell prompt / 编辑器的体验更一致。
cursor_shape beam
# 关闭闪烁，减少视线干扰。
cursor_blink_interval 0
# 保留原来的 cursor trail 效果。
cursor_trail 3000

# 记住上次窗口大小，而不是每次回到应用默认尺寸。
remember_window_size yes
# 首次启动或缓存丢失时的兜底尺寸。
initial_window_width 120c
initial_window_height 34c
# 优先纵向分屏，同时保留常用宽布局。
enabled_layouts splits:split_axis=vertical,Grid,Fat,Tall
# 进入 resize 模式后按较小步长调整，控制更细。
window_resize_step_cells 2
window_resize_step_lines 2
# 给终端内容留一点呼吸空间，避免贴边。
window_padding_width 6
# 多出来的空白居中分布，不偏到某一侧。
placement_strategy center
# 保留当前半透明风格。
background_opacity 0.9

# 关闭声音提示，避免开发时被 bell 打断。
visual_bell_duration 0.0
enable_audio_bell no

# 隐藏 titlebar 但保留系统窗口控制按钮。
hide_window_decorations titlebar-only
# 把 Option 当作 Alt，方便终端程序使用 alt 组合键。
macos_option_as_alt yes
# 不出现在 Cmd+Tab 和 Dock 任务列表里，减少干扰。
macos_hide_from_tasks yes
# 关闭最后一个窗口时不退出应用，保持 macOS 终端习惯。
macos_quit_when_last_window_closed no
# 因为 titlebar 隐藏了，所以把活动窗口标题放到 menubar。
macos_show_window_title_in menubar
# 使用标准 srgb，保证颜色和浏览器等环境一致。
macos_colorspace srgb

# 用边框颜色帮助快速识别当前 pane 和 bell 状态。
active_border_color #5bee96
inactive_border_color #00475a
bell_border_color #f86100

# 活动 tab 更醒目，但不改主题本身。
active_tab_font_style bold
inactive_text_alpha 0.9
# 保留现有 slant 风格，并围绕它优化 tab 信息密度。
tab_bar_style slant
tab_bar_align left
tab_bar_min_tabs 2
tab_powerline_style slanted
# 限制 tab 标题长度，避免 tab 多时被单个长标题吞掉空间。
tab_title_max_length 36
# 在标题前显示 tab 序号，方便键盘导航时快速识别。
tab_title_template "{index}:{title}"
active_tab_title_template "{index}:{title}"
