# vim:fileencoding=utf-8:ft=kitty
# 运行时行为：复制粘贴、链接、滚动历史与 shell 联动。

# 开启 shell integration，支持 prompt 标记、cwd 跟踪等能力。
shell_integration enabled
# 选中文本立刻复制到系统剪贴板，更符合 macOS 习惯。
copy_on_select clipboard
# 普通选择复制时智能去掉行尾空格，减少脏文本。
strip_trailing_spaces smart
# 让路径、URL、带命名空间的文本更容易一次性选中。
select_by_word_characters @-./_~?&=%+#:

# 允许终端程序写剪贴板，但禁止直接读系统剪贴板，降低风险。
clipboard_control write-clipboard write-primary no-append
# 在 prompt 处粘贴 URL 时自动引用；大段粘贴仍要求确认。
paste_actions quote-urls-at-prompt,confirm-if-large

# 增大滚动历史，方便查日志和回溯输出。
scrollback_lines 20000
# 调高滚轮/触控板滚动速度。
wheel_scroll_multiplier 5.0
# 鼠标悬停链接时显示真实目标，避免误点。
show_hyperlink_targets yes
# 悬停 URL 时给出更明显的视觉提示。
url_style curly
# 优先走 kitty open-actions，找不到再回退系统默认打开方式。
open_url_with default

# 关闭 OS window 时不再弹确认，适合高频键盘流操作。
confirm_os_window_close 0
# 开启 OSC 8 hyperlinks，支持更多终端内可点击链接。
allow_hyperlinks yes
